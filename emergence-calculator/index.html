<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emergence GDU Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --font-din: 'Titillium Web', sans-serif;
    --font-din-body: 'Titillium Web', sans-serif;
    --font-data: 'Titillium Web', sans-serif;
  }
</style>
<style>
  :root {
    --soil: #12100a;
    --soil-light: #1c1812;
    --earth: #8b6347;
    --straw: #d4a853;
    --straw-light: #f0cc7a;
    --green: #4a7c3f;
    --green-light: #6aaa5e;
    --sky: #b8d4e8;
    --cream: #f5edd8;
    --paper: #faf6ee;
    --corn-gold: #f5a623;
    --soy-green: #5b8f3a;
    --warn: #c0392b;
    --text: #1a1208;
    --text-light: #6b5a42;
    --border: #2e2418;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #faf6ee;
color: #1a1208;
font-family: var(–font-din-body);
min-height: 100vh;
}

header {
background: var(–soil);
color: var(–cream);
padding: 20px 32px;
display: flex;
align-items: center;
gap: 16px;
border-bottom: 4px solid var(–straw);
position: relative;
overflow: hidden;
}

header::after {
content: ‘’;
position: absolute;
right: 0; top: 0; bottom: 0;
width: 200px;
background: repeating-linear-gradient(
90deg,
transparent,
transparent 12px,
rgba(212,168,83,0.08) 12px,
rgba(212,168,83,0.08) 14px
);
}

.header-logo { font-size: 2.2rem; margin-right: 4px; letter-spacing: -2px; }

header h1 {
font-family: var(–font-din);
font-size: 1.6rem;
font-weight: 900;
letter-spacing: -0.5px;
line-height: 1.1;
}

header p {
font-family: var(–font-data);
font-size: 0.7rem;
color: var(–straw-light);
margin-top: 4px;
letter-spacing: 0.08em;
text-transform: uppercase;
}

.main-grid {
display: grid;
grid-template-columns: 380px 1fr;
gap: 0;
min-height: calc(100vh - 85px);
}

.sidebar {
background: #3d2b1f;
padding: 28px 24px;
border-right: 3px solid #5c3d2e;
overflow-y: auto;
}

.section-label {
font-family: var(–font-data);
font-size: 0.65rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: #f5edd8;
margin-bottom: 10px;
margin-top: 22px;
padding-bottom: 6px;
border-bottom: 1px solid rgba(245,237,216,0.25);
}
.section-label:first-child { margin-top: 0; }

.field-group { margin-bottom: 14px; }

label {
display: block;
font-size: 0.82rem;
color: #f5edd8;
margin-bottom: 5px;
font-weight: 600;
}

input, select {
width: 100%;
padding: 9px 12px;
background: #f8f0dc;
border: 2px solid #d4a853;
border-radius: 6px;
color: #1a1208;
font-family: var(–font-data);
font-size: 0.85rem;
outline: none;
transition: border-color 0.2s, background 0.2s;
}

input:focus, select:focus {
border-color: #f0cc7a;
background: #fff8ea;
box-shadow: 0 0 0 3px rgba(212,168,83,0.25);
}

select option { background: #2a2010; color: #f5edd8; }

.radio-group {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.radio-btn { flex: 1; min-width: 80px; }
.radio-btn input[type=radio] { display: none; }

.radio-btn label {
display: block;
text-align: center;
padding: 8px 6px;
background: rgba(245,237,216,0.12);
border: 1.5px solid rgba(245,237,216,0.3);
border-radius: 6px;
cursor: pointer;
font-size: 0.78rem;
color: #f5edd8;
transition: all 0.18s;
margin: 0;
}

.radio-btn input[type=radio]:checked + label {
background: #d4a853;
color: #1a1208;
border-color: #f0cc7a;
font-weight: 700;
box-shadow: 0 0 0 3px rgba(212,168,83,0.5);
}

.calc-btn {
width: 100%;
margin-top: 22px;
padding: 14px;
background: var(–straw);
color: #1a1208;
border: none;
border-radius: 8px;
font-family: var(–font-din);
font-size: 1.05rem;
font-weight: 700;
cursor: pointer;
transition: all 0.2s;
letter-spacing: 0.02em;
}

.calc-btn:hover { background: var(–straw-light); transform: translateY(-1px); }
.calc-btn:active { transform: translateY(0); }

.status-msg {
margin-top: 12px;
padding: 10px 12px;
border-radius: 6px;
font-family: var(–font-data);
font-size: 0.85rem;
line-height: 1.5;
}
.status-msg.info    { background: rgba(212,168,83,0.15); color: #f0cc7a; border: 1px solid rgba(212,168,83,0.3); }
.status-msg.error   { background: rgba(192,57,43,0.2);  color: #f08080; border: 1px solid rgba(192,57,43,0.4); }
.status-msg.success { background: rgba(74,124,63,0.25); color: #a8e090; border: 1px solid rgba(74,124,63,0.5); }

.content {
padding: 28px 32px;
overflow-y: auto;
}

.placeholder {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100%;
color: var(–text-light);
text-align: center;
gap: 18px;
padding: 32px;
}

.placeholder h2 { font-family: var(–font-din); font-size: 1.4rem; color: var(–straw-light); margin: 0; }
.placeholder p  { font-size: 0.9rem; max-width: 320px; opacity: 0.7; margin: 0; }

.results { display: flex; flex-direction: column; gap: 24px; }

.result-header {
display: flex;
align-items: flex-start;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
}

.result-title {
font-family: var(–font-din);
font-size: 1.5rem;
font-weight: 700;
color: #8b6347;
}

.result-subtitle {
font-family: var(–font-data);
font-size: 0.72rem;
color: var(–text-light);
margin-top: 4px;
letter-spacing: 0.05em;
}

.forecast-meta {
background: #f0e8d0;
border: 1px solid #c9a060;
border-radius: 8px;
padding: 10px 14px;
font-family: var(–font-data);
font-size: 0.7rem;
color: #6b4e2a;
display: flex;
flex-wrap: wrap;
gap: 6px 20px;
line-height: 1.6;
}

.forecast-meta-item { display: flex; flex-direction: column; gap: 1px; }
.forecast-meta-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.65; }
.forecast-meta-val   { font-weight: 600; color: #3d2b1f; font-size: 0.72rem; }

/* ── Precip source badge ─────────────────────────────────────────────────── */
.precip-source-badge {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 4px 10px;
border-radius: 20px;
font-family: var(–font-data);
font-size: 0.68rem;
font-weight: 600;
letter-spacing: 0.04em;
white-space: nowrap;
}
.precip-source-badge.src-seamless {
background: #d8f0e8;
color: #0a5a30;
border: 1px solid #5ab890;
}
.precip-source-badge.src-mixed {
background: #e8f0fc;
color: #1a3a7a;
border: 1px solid #7aA0d8;
}
.precip-source-badge.src-forecast {
background: #fdf3dc;
color: #6a4800;
border: 1px solid #c49a2a;
}
.precip-source-badge.src-archive {
background: #f0e8d0;
color: #5a3800;
border: 1px solid #c9a060;
}
.precip-source-dot {
width: 7px; height: 7px;
border-radius: 50%;
flex-shrink: 0;
}

.weather-badge {
background: #b8d4e8;
color: #1a3a5c;
padding: 6px 12px;
border-radius: 20px;
font-family: var(–font-data);
font-size: 0.7rem;
font-weight: 500;
}

.crop-panels {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.crop-panel {
background: #f5edd8;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 2px 20px rgba(0,0,0,0.5);
border: 1.5px solid #c9a060;
}

.crop-header {
padding: 14px 18px;
display: flex;
align-items: center;
gap: 10px;
}

.crop-header.corn { background: linear-gradient(135deg, #8b6d1a, #c49a2a); }
.crop-header.soy  { background: linear-gradient(135deg, #2d5a1b, #4a8c35); }

.crop-header h3 {
font-family: var(–font-din);
font-size: 1.1rem;
color: white;
font-weight: 700;
}

.crop-header .crop-emoji { font-size: 1.4rem; }

.crop-body { padding: 18px; }

.cal-wrap { margin-bottom: 14px; }

.cal-month-label {
font-family: var(–font-din);
font-size: 0.78rem;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(–text-light);
margin-bottom: 5px;
margin-top: 10px;
}
.cal-month-label:first-child { margin-top: 0; }

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 5px;
margin-bottom: 5px;
}

.cal-dow-row {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
margin-bottom: 4px;
}

.cal-dow {
font-family: var(–font-din);
font-size: 0.72rem;
text-align: center;
color: var(–text-light);
opacity: 0.6;
}

.cal-cell {
aspect-ratio: 1;
border-radius: 6px;
display: flex;
align-items: center;
justify-content: center;
font-family: var(–font-din);
font-size: 0.72rem;
font-weight: 500;
cursor: default;
position: relative;
transition: transform 0.12s;
border: 1.5px solid transparent;
min-width: 0;
}

.cal-cell:hover { transform: scale(1.2); z-index: 10; }

.cal-tooltip {
position: absolute;
background: #2e2210 !important;
color: #f0e0b8 !important;
border: 2px solid #d4a853;
border-radius: 8px;
padding: 10px 14px;
font-family: var(–font-din);
font-size: 0.9rem;
line-height: 1.6;
pointer-events: none;
z-index: 9999;
white-space: nowrap;
display: none;
box-shadow: 0 6px 20px rgba(0,0,0,0.7);
top: 0; left: 0;
opacity: 1 !important;
}

.cal-tooltip-date {
font-weight: 700;
font-size: 0.95rem;
color: var(–straw);
margin-bottom: 5px;
letter-spacing: 0.04em;
}

.cal-tooltip-row {
display: flex;
justify-content: space-between;
gap: 16px;
font-size: 0.85rem;
line-height: 1.6;
}

.cal-tooltip-label { color: #c8a860; }
.cal-tooltip-val   { font-weight: 700; text-align: right; color: #f8f0dc; }

.cal-cell.empty     { background: transparent; border: none; }
.cal-cell.pre-plant { background: #e0d0a8; color: #a08040; border-color: transparent; }

.cal-cell.gdu-0 { background: #f0b8b0; color: #7a1a10; border-color: #d89080; }
.cal-cell.gdu-1 { background: #f5cfa0; color: #7a3a00; border-color: #e0a860; }
.cal-cell.gdu-2 { background: #f5e8a0; color: #6a5000; border-color: #d8cc70; }
.cal-cell.gdu-3 { background: #c8e8a8; color: #1a5010; border-color: #88c878; }
.cal-cell.gdu-4 { background: #88c860; color: #0a3008; border-color: #58a030; }

.cal-cell.climate {
opacity: 0.7;
border-style: dashed !important;
}

.cal-cell.emergence {
border: 2.5px solid #1a5008 !important;
box-shadow: 0 0 0 3px rgba(58,160,20,0.45), 0 2px 10px rgba(58,160,20,0.35);
z-index: 5;
font-weight: 700;
background: #3a9018 !important;
transform: scale(1.18);
}
.cal-cell.emergence:hover { transform: scale(1.28); }

.status-bar-wrap {
background: #e8d5a8;
border: 1.5px solid var(–border);
border-radius: 10px;
padding: 14px 16px;
margin-bottom: 14px;
}

.status-bar-header {
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 10px;
}

.status-bar-gdu {
font-family: var(–font-din);
font-size: 1.5rem;
font-weight: 700;
line-height: 1;
}

.status-bar-sub {
font-family: var(–font-din);
font-size: 0.76rem;
color: var(–text-light);
text-transform: uppercase;
letter-spacing: 0.07em;
margin-top: 2px;
}

.status-bar-track {
height: 10px;
background: #d4b880;
border-radius: 5px;
overflow: visible;
position: relative;
margin-bottom: 6px;
}

.status-bar-fill {
height: 100%;
border-radius: 5px;
transition: width 1s cubic-bezier(0.34,1.1,0.64,1);
width: 0%;
position: relative;
}

.status-bar-fill::after {
content: ‘’;
position: absolute;
right: -1px; top: -3px;
width: 16px; height: 16px;
border-radius: 50%;
background: inherit;
border: 2px solid white;
box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.days-in-soil {
text-align: right;
padding-left: 12px;
border-left: 1.5px solid #c9a060;
}

.days-in-soil-val {
font-family: var(–font-din);
font-size: 1.5rem;
font-weight: 700;
line-height: 1;
}

.days-in-soil-label {
font-family: var(–font-din);
font-size: 0.76rem;
color: var(–text-light);
text-transform: uppercase;
letter-spacing: 0.07em;
margin-top: 2px;
}

.status-bar-dates {
display: flex;
justify-content: space-between;
font-family: var(–font-data);
font-size: 0.76rem;
color: var(–text-light);
margin-top: 4px;
}

.status-emerge-callout { margin-top: 12px; padding: 12px 16px; border-radius: 9px; font-family: var(–font-din); font-weight: 600; }

.status-emerge-callout.projected { background: #d8f0c8; border: 2px solid #4a7c3f; color: #1a4010; }
.status-emerge-callout.projected .callout-main { font-size: 1.15rem; font-weight: 700; display: block; margin-bottom: 3px; }
.status-emerge-callout.projected .callout-sub  { font-size: 0.85rem; font-weight: 400; color: #3a6a28; display: block; }

.status-emerge-callout.emerged { background: #2d6a20; border: 2px solid #1a4010; color: #fff; }
.status-emerge-callout.emerged .callout-main { font-size: 1.15rem; font-weight: 700; display: block; margin-bottom: 3px; }
.status-emerge-callout.emerged .callout-sub  { font-size: 0.85rem; font-weight: 400; opacity: 0.85; display: block; }

.status-emerge-callout.pending { background: #fdf3dc; border: 2px solid #c49a2a; color: #6a4800; font-size: 1rem; padding: 10px 16px; }

.soil-temp-note {
margin-top: 8px;
padding: 5px 10px;
border-radius: 5px;
font-family: var(–font-din);
font-size: 0.82rem;
font-weight: 500;
}
.soil-temp-note.full    { background: rgba(74,124,63,0.12); border: 1px solid rgba(74,124,63,0.35); color: #2a5a18; }
.soil-temp-note.partial { background: rgba(180,140,60,0.12); border: 1px solid rgba(180,140,60,0.35); color: #6a4800; }
.soil-temp-note.air     { background: rgba(100,130,160,0.12); border: 1px solid rgba(100,130,160,0.25); color: #2a4060; }

.cal-legend {
display: flex;
align-items: center;
gap: 4px;
margin-top: 8px;
font-family: var(–font-din);
font-size: 0.76rem;
color: #6b4e2a;
}

.cal-legend-cell { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }

.adj-note {
background: #e8d5a8;
border-left: 3px solid var(–straw);
padding: 8px 10px;
border-radius: 0 6px 6px 0;
font-size: 0.75rem;
color: #6b4e2a;
font-family: var(–font-din);
line-height: 1.5;
margin-top: 10px;
}

.rainfall-alert {
border-radius: 7px;
padding: 9px 13px;
font-family: var(–font-din);
font-size: 0.85rem;
font-weight: 500;
line-height: 1.4;
margin-bottom: 6px;
}
.rainfall-alert.alert-dry  { background:#fdf3dc; border:1.5px solid #c49a2a; color:#6a4800; }
.rainfall-alert.alert-wet  { background:#dceef8; border:1.5px solid #2878c8; color:#0a3a6a; }
.rainfall-alert.alert-cold { background:#fce8e8; border:1.5px solid #c03030; color:#6a0a0a; }

.rain-legend {
display: flex;
align-items: center;
gap: 6px;
margin-top: 4px;
font-family: var(–font-din);
font-size: 0.76rem;
color: var(–text-light);
flex-wrap: wrap;
}

.climate-note {
background: #e0eef8;
border-left: 3px solid #5a9fc7;
padding: 8px 10px;
border-radius: 0 6px 6px 0;
font-size: 0.84rem;
color: #1a4060;
font-family: var(–font-din);
line-height: 1.5;
margin-top: 8px;
}

.td-climate { opacity: 0.65; font-style: italic; }
.climate-row-label { font-size: 0.6rem; color: #5a9fc7; margin-left: 4px; }

.chart-section {
background: #f5edd8;
border-radius: 12px;
border: 1.5px solid #c9a060;
box-shadow: 0 2px 20px rgba(0,0,0,0.5);
padding: 20px 24px;
}

.chart-title {
font-family: var(–font-din);
font-size: 1rem;
font-weight: 700;
color: var(–straw);
margin-bottom: 16px;
}

.chart-canvas-wrap { position: relative; width: 100%; height: 220px; }
canvas { width: 100%; height: 100%; }

.table-section {
background: #f5edd8;
border-radius: 12px;
border: 1.5px solid #c9a060;
box-shadow: 0 2px 20px rgba(0,0,0,0.5);
overflow: hidden;
}

.table-header {
padding: 14px 20px;
background: #3d2b1f;
display: flex;
justify-content: space-between;
align-items: center;
}

.table-header h3 { font-family: var(–font-din); color: var(–cream); font-size: 0.95rem; }

.table-scroll { overflow-x: auto; max-height: 280px; overflow-y: auto; }

table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
thead { position: sticky; top: 0; z-index: 2; }

th {
background: #e8d5a8;
padding: 8px 12px;
text-align: left;
font-family: var(–font-data);
font-size: 0.65rem;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(–text-light);
border-bottom: 2px solid var(–border);
}

td {
padding: 7px 12px;
border-bottom: 1px solid #ddd0b0;
font-family: var(–font-data);
font-size: 0.76rem;
color: #1a1208;
}

tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: #f0e8d0; }

.td-corn    { color: #8b6d1a; font-weight: 600; }
.td-soy     { color: #2d5a1b; font-weight: 600; }
.td-emerged { font-weight: 700; }

.spinner {
display: inline-block;
width: 16px; height: 16px;
border: 2px solid rgba(212,168,83,0.3);
border-top-color: var(–straw);
border-radius: 50%;
animation: spin 0.8s linear infinite;
vertical-align: middle;
margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) {
.main-grid    { grid-template-columns: 1fr; }
.crop-panels  { grid-template-columns: 1fr; }
.sidebar      { border-right: none; border-bottom: 3px solid var(–earth); }
}
</style>

</head>
<body>

<header>
  <div class="header-logo">🌽🌱</div>
  <div>
    <h1>Emergence GDU Calculator</h1>
    <p>Soil-adjusted growing degree unit accumulation tracker</p>
  </div>
</header>

<div class="main-grid">
  <div class="sidebar">

```
<div class="section-label">📍 Location</div>
<div class="field-group">
  <label>City or ZIP Code</label>
  <input type="text" id="locationInput" placeholder="e.g. 61414  or  Galesburg, IL" value=""/>
</div>

<div class="section-label">🌽 Planting</div>
<div class="field-group">
  <label>Planting Date</label>
  <input type="date" id="plantDate"/>
</div>

<div class="field-group">
  <label>Planting Time of Day</label>
  <div class="radio-group">
    <div class="radio-btn"><input type="radio" name="plantTime" id="ptMorning" value="full" checked/><label for="ptMorning">Morning<br><span style="font-size:0.65rem;opacity:0.7">Full day</span></label></div>
    <div class="radio-btn"><input type="radio" name="plantTime" id="ptAfternoon" value="half"/><label for="ptAfternoon">Afternoon<br><span style="font-size:0.65rem;opacity:0.7">Half day</span></label></div>
    <div class="radio-btn"><input type="radio" name="plantTime" id="ptEvening" value="skip"/><label for="ptEvening">Evening<br><span style="font-size:0.65rem;opacity:0.7">Skip day</span></label></div>
  </div>
</div>

<div class="section-label">🪱 Soil & Tillage</div>
<div class="field-group">
  <label>Soil Type</label>
  <select id="soilType">
    <option value="sandy">Sandy / Loamy Sand</option>
    <option value="siltloam" selected>Silt Loam / Loam</option>
    <option value="clay">Heavy Clay</option>
  </select>
</div>

<div class="field-group">

// ─── LOCAL DATE HELPER ────────────────────────────────────────────────────────
function localToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const GDU_TARGETS = {
  corn: { base: 120, low: 100, high: 140 },
  soy:  { base: 100, low: 90,  high: 130 }
};

const SOIL_GDU_ADJ = {
  sandy:    -10,
  siltloam:   0,
  clay:      45,
};

const TILLAGE_GDU_ADJ = {
  notill:       40,
  vertical:     15,
  conventional:  0,
};

const SOIL_LABELS = { sandy: 'Sandy/Loamy Sand', siltloam: 'Silt Loam/Loam', clay: 'Heavy Clay' };
const TILL_LABELS  = { notill: 'No-Till/Strip-Till', vertical: 'Vertical Tillage', conventional: 'Conventional Till' };

// ─── GEOCODE ──────────────────────────────────────────────────────────────────
function geoFetch(url, opts = {}) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 8000);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .then(r => { clearTimeout(tid); return r.json(); })
    .catch(() => { clearTimeout(tid); return null; });
}

const STATE_ABBR = {
  'ALABAMA':'AL','ALASKA':'AK','ARIZONA':'AZ','ARKANSAS':'AR','CALIFORNIA':'CA',
  'COLORADO':'CO','CONNECTICUT':'CT','DELAWARE':'DE','FLORIDA':'FL','GEORGIA':'GA',
  'HAWAII':'HI','IDAHO':'ID','ILLINOIS':'IL','INDIANA':'IN','IOWA':'IA',
  'KANSAS':'KS','KENTUCKY':'KY','LOUISIANA':'LA','MAINE':'ME','MARYLAND':'MD',
  'MASSACHUSETTS':'MA','MICHIGAN':'MI','MINNESOTA':'MN','MISSISSIPPI':'MS',
  'MISSOURI':'MO','MONTANA':'MT','NEBRASKA':'NE','NEVADA':'NV','NEW HAMPSHIRE':'NH',
  'NEW JERSEY':'NJ','NEW MEXICO':'NM','NEW YORK':'NY','NORTH CAROLINA':'NC',
  'NORTH DAKOTA':'ND','OHIO':'OH','OKLAHOMA':'OK','OREGON':'OR','PENNSYLVANIA':'PA',
  'RHODE ISLAND':'RI','SOUTH CAROLINA':'SC','SOUTH DAKOTA':'SD','TENNESSEE':'TN',
  'TEXAS':'TX','UTAH':'UT','VERMONT':'VT','VIRGINIA':'VA','WASHINGTON':'WA',
  'WEST VIRGINIA':'WV','WISCONSIN':'WI','WYOMING':'WY'
};

async function geocode(query) {
  const q = query.trim();
  let cityName  = q;
  let stateHint = '';
  const commaIdx = q.indexOf(',');
  if (commaIdx > 0) {
    cityName  = q.slice(0, commaIdx).trim();
    const raw = q.slice(commaIdx + 1).trim().toUpperCase();
    stateHint = STATE_ABBR[raw] || raw;
  }

  function pickUSResult(results) {
    if (!results || !results.length) return null;
    const us = results.filter(r => r.country_code === 'US');
    if (!us.length) return null;
    if (stateHint.length === 2) {
      const match = us.find(r => {
        const code = (r.admin1_code || '').toUpperCase();
        const name = (r.admin1 || '').toUpperCase();
        return code === stateHint || STATE_ABBR[name] === stateHint;
      });
      if (match) return match;
    }
    return us[0];
  }

  const omCityUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=20&language=en&format=json`;
  const omFullUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=10&language=en&format=json`;

  const [omCity, omFull] = await Promise.all([
    geoFetch(omCityUrl),
    cityName !== q ? geoFetch(omFullUrl) : Promise.resolve(null),
  ]);

  const hit = pickUSResult(omCity?.results) || pickUSResult(omFull?.results);
  if (hit) return hit;

  const isZip = /^\d{5}$/.test(q.replace(/\s/g, ''));
  const nomUrl = isZip
    ? `https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(q)}&countrycodes=us&format=json&limit=5`
    : `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=us&format=json&limit=5`;

  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 12000);
  const nomData = await fetch(nomUrl, {
    signal: ctrl.signal,
    headers: { 'Accept-Language': 'en-US,en', 'User-Agent': 'AgronomyINFO-GDU/1.0' }
  }).then(r => { clearTimeout(tid); return r.json(); })
    .catch(() => { clearTimeout(tid); return null; });

  if (nomData && nomData.length) {
    const h     = nomData[0];
    const parts = (h.display_name || '').split(',').map(s => s.trim());
    return {
      name: parts[0] || cityName,
      admin1: parts[2] || parts[1] || stateHint || '',
      latitude: parseFloat(h.lat),
      longitude: parseFloat(h.lon),
      country_code: 'US'
    };
  }

  throw new Error(`Location "${q}" not found. Try a ZIP code (e.g. 61414) or "City, ST" format (e.g. Galesburg, IL).`);
}

// ─── WEATHER ──────────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon, startDate, days) {
  const endDt = new Date(startDate + 'T12:00:00');
  endDt.setDate(endDt.getDate() + days + 10);
  const endStr = endDt.toISOString().slice(0,10);
  const today = localToday();

  const yesterday = new Date(today + 'T12:00:00');
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = yesterday.toISOString().slice(0, 10);

  const archEnd = endStr < today ? endStr : yesterdayStr;
  const needsArchive = startDate <= yesterdayStr;

  function timedFetch(url, ms = 12000) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { signal: ctrl.signal })
      .then(r => { clearTimeout(tid); return r.json(); })
      .catch(() => { clearTimeout(tid); return null; });
  }

  // Fetch A: forecast hourly temps
  const fetchForecastHourly = timedFetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&hourly=temperature_2m,soil_temperature_6cm&temperature_unit=fahrenheit` +
    `&past_days=14&forecast_days=16&timezone=auto`
  );

  // Fetch B: archive hourly temps
  const fetchArchiveHourly = needsArchive
    ? timedFetch(
        `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
        `&hourly=temperature_2m,soil_temperature_6cm&temperature_unit=fahrenheit` +
        `&start_date=${startDate}&end_date=${archEnd}&timezone=auto`
      )
    : Promise.resolve(null);

  // ── PRECIP: three sources, fired in parallel ────────────────────────────────

  // Fetch C1: ERA5-seamless — hybrid ERA5 + real-time analysis, lags only ~1-2 days.
  // This is the primary past-precip source. Uses the same archive endpoint but with
  // models=era5_seamless which instructs Open-Meteo to blend in ERA5-RT for recent dates.
  const fetchSeamlessPrecip = needsArchive
    ? timedFetch(
        `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
        `&daily=precipitation_sum&timezone=auto&models=era5_seamless` +
        `&start_date=${startDate}&end_date=${yesterdayStr}`
      )
    : Promise.resolve(null);

  // Fetch C2: ERA5 classic — authoritative reanalysis but lags ~5 days.
  // Used as a secondary fill for dates seamless may miss (rare).
  const fetchArchivePrecip = needsArchive
    ? timedFetch(
        `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
        `&daily=precipitation_sum&timezone=auto` +
        `&start_date=${startDate}&end_date=${yesterdayStr}`
      )
    : Promise.resolve(null);

  // Fetch D: Forecast precip — covers today, future, and any remaining ERA5 lag gap.
  // past_days=7 ensures we cover the full ~5-day ERA5 lag window plus a buffer.
  const fetchForecastPrecip = timedFetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&daily=precipitation_sum&timezone=auto&past_days=7&forecast_days=16`
  );

  // Fire all five fetches in parallel
  const [d1, d2, dps, dpa, dp] = await Promise.all([
    fetchForecastHourly,
    fetchArchiveHourly,
    fetchSeamlessPrecip,
    fetchArchivePrecip,
    fetchForecastPrecip,
  ]);

  // Retry forecast hourly if it failed
  let d1Final = d1;
  if (!d1Final || !d1Final.hourly) {
    showStatus('<span class="spinner"></span>Retrying weather fetch…', 'info', true);
    d1Final = await timedFetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&hourly=temperature_2m,soil_temperature_6cm&temperature_unit=fahrenheit` +
      `&past_days=14&forecast_days=16&timezone=auto`,
      15000
    );
    if (!d1Final || !d1Final.hourly) throw new Error('Weather data unavailable — check your connection and try again.');
  }

  // ── Ingest hourly temp data ───────────────────────────────────────────────
  let hourlyData = {};
  let precipData = {};

  function ingestHourly(d) {
    if (!d || !d.hourly || !d.hourly.time) return;
    d.hourly.time.forEach((t, i) => {
      const date = t.slice(0, 10);
      if (!hourlyData[date]) hourlyData[date] = { soilTemps: [], airTemps: [] };
      const st = d.hourly.soil_temperature_6cm[i];
      const at = d.hourly.temperature_2m[i];
      if (st !== null && st !== undefined) hourlyData[date].soilTemps.push(st);
      if (at !== null && at !== undefined) hourlyData[date].airTemps.push(at);
    });
  }

  ingestHourly(d1Final);
  ingestHourly(d2);

  // ── Ingest precip: ERA5-seamless → ERA5 classic → forecast ───────────────
  // Priority order: seamless wins (lowest lag), classic fills gaps in seamless,
  // forecast fills any remaining nulls (today, future, and stubborn lag gaps).
  // KEY FIX: downstream fills check for both undefined AND null — ERA5 archive
  // returns explicit null for dates within its ~5-day lag window, which previously
  // blocked forecast data from filling in. Now all three sources can override nulls.

  const precipSource = {}; // date → 'seamless' | 'archive' | 'forecast'

  // Priority 1: ERA5-seamless (lowest lag, ~1-2 days behind real time)
  if (dps && dps.daily && dps.daily.time) {
    dps.daily.time.forEach((t, i) => {
      const p = dps.daily.precipitation_sum[i];
      if (p !== null && p !== undefined) {
        precipData[t] = p;
        precipSource[t] = 'seamless';
      }
    });
  }

  // Priority 2: ERA5 classic — fills where seamless had null or is missing
  if (dpa && dpa.daily && dpa.daily.time) {
    dpa.daily.time.forEach((t, i) => {
      const p = dpa.daily.precipitation_sum[i];
      if (p !== null && p !== undefined &&
          (precipData[t] === undefined || precipData[t] === null)) {
        precipData[t] = p;
        precipSource[t] = 'archive';
      }
    });
  }

  // Priority 3: Forecast — fills today, future, and any remaining lag gaps
  if (dp && dp.daily && dp.daily.time) {
    dp.daily.time.forEach((t, i) => {
      const p = dp.daily.precipitation_sum[i];
      if (p !== null && p !== undefined &&
          (precipData[t] === undefined || precipData[t] === null)) {
        precipData[t] = p;
        precipSource[t] = 'forecast';
      }
    });
  }

  // ── Build daily arrays ────────────────────────────────────────────────────
  // KEY FIX: Decouple precip row creation from temp data availability.
  // Previously, if a date had no hourly temp entries (e.g. the planting date
  // itself, or a day where the archive returned sparse data), the entire row
  // was silently dropped — taking its rainfall with it. Now we always create
  // a row for any date between startDate and yesterday that has precip data,
  // even if temps are missing. GDU for such days will be 0 (nulls guarded in
  // dailyGDU), but the rainfall is preserved in the observed total.
  const daily = { time: [], tmax: [], tmin: [], soilTmax: [], soilTmin: [], usedSoil: [], precip: [], precipSource: [] };
  let cur = new Date(startDate + 'T12:00:00');
  const endDate = new Date(endStr + 'T12:00:00');

  while (cur <= endDate) {
    const ds = cur.toISOString().slice(0, 10);
    const entry = hourlyData[ds];
    const hasTemps  = entry && entry.airTemps.length > 0;
    const hasPrecip = precipData[ds] !== undefined && precipData[ds] !== null;

    if (hasTemps) {
      // Normal full row — temps + precip both available
      const useSoil = entry.soilTemps.length >= 4;
      daily.time.push(ds);
      daily.tmax.push(Math.max(...entry.airTemps));
      daily.tmin.push(Math.min(...entry.airTemps));
      daily.soilTmax.push(useSoil ? Math.max(...entry.soilTemps) : null);
      daily.soilTmin.push(useSoil ? Math.min(...entry.soilTemps) : null);
      daily.usedSoil.push(useSoil);
      daily.precip.push(hasPrecip ? precipData[ds] : null);
      daily.precipSource.push(precipSource[ds] || null);
    } else if (hasPrecip && ds >= startDate && ds <= yesterdayStr) {
      // Temp data missing but precip exists for a past date — preserve precip.
      // GDU contribution is 0 (dailyGDU guards against null temps).
      // This catches the planting date and any day where hourly archive is sparse.
      daily.time.push(ds);
      daily.tmax.push(null);
      daily.tmin.push(null);
      daily.soilTmax.push(null);
      daily.soilTmin.push(null);
      daily.usedSoil.push(false);
      daily.precip.push(precipData[ds]);
      daily.precipSource.push(precipSource[ds] || null);
    }
    cur.setDate(cur.getDate() + 1);
  }

  const soilDays = daily.usedSoil.filter(Boolean).length;

  // ── Build precip source summary for badge ────────────────────────────────
  const sourceCounts = { seamless: 0, archive: 0, forecast: 0 };
  daily.precipSource.forEach(s => { if (s && sourceCounts[s] !== undefined) sourceCounts[s]++; });

  // Determine dominant past-data source label for the badge
  let precipSourceSummary;
  const totalSourced = sourceCounts.seamless + sourceCounts.archive + sourceCounts.forecast;
  if (totalSourced === 0) {
    precipSourceSummary = { label: 'No precip data', cls: 'src-forecast', dot: '#c49a2a' };
  } else if (sourceCounts.seamless > 0 && sourceCounts.archive === 0 && sourceCounts.forecast === 0) {
    precipSourceSummary = { label: 'Rain: ERA5-Seamless', cls: 'src-seamless', dot: '#0a8a50' };
  } else if (sourceCounts.seamless > 0 && sourceCounts.forecast > 0 && sourceCounts.archive === 0) {
    precipSourceSummary = { label: 'Rain: Seamless + Fcst', cls: 'src-mixed', dot: '#2a60c8' };
  } else if (sourceCounts.seamless > 0 && (sourceCounts.archive > 0 || sourceCounts.forecast > 0)) {
    precipSourceSummary = { label: 'Rain: ERA5-S + Fcst', cls: 'src-mixed', dot: '#2a60c8' };
  } else if (sourceCounts.archive > 0 && sourceCounts.forecast > 0) {
    precipSourceSummary = { label: 'Rain: ERA5 + Fcst', cls: 'src-mixed', dot: '#2a60c8' };
  } else if (sourceCounts.archive > 0) {
    precipSourceSummary = { label: 'Rain: ERA5', cls: 'src-archive', dot: '#8b6347' };
  } else {
    precipSourceSummary = { label: 'Rain: Forecast only', cls: 'src-forecast', dot: '#c49a2a' };
  }

  const forecastMeta = {
    generationTime: d1Final.generationtime_ms ? Math.round(d1Final.generationtime_ms) : null,
    timezone: d1Final.timezone || null,
    model: 'Open-Meteo Best Match (GFS/ICON/ECMWF ensemble)',
    fetchedAt: new Date().toISOString(),
    sourceCounts,
    precipSourceSummary,
  };

  return { daily, soilDays, totalDays: daily.time.length, precipData, forecastMeta };
}

// ─── CLIMATE NORMALS ──────────────────────────────────────────────────────────
async function fetchClimateNormals(lat, lon, lastKnownDate, daysNeeded) {
  const YEARS = [2009,2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023];

  const windowStart = new Date(lastKnownDate + 'T12:00:00');
  windowStart.setDate(windowStart.getDate() + 1);
  const windowEnd = new Date(windowStart);
  windowEnd.setDate(windowEnd.getDate() + 89);

  const startMD = windowStart.toISOString().slice(5, 10);
  const endMD   = windowEnd.toISOString().slice(5, 10);

  const byDOY = {};

  async function fetchOneYear(yr) {
    const s = `${yr}-${startMD}`;
    let eYr = yr;
    const eDate = new Date(`${yr}-${endMD}T12:00:00`);
    if (eDate < new Date(`${yr}-${startMD}T12:00:00`)) eYr = yr + 1;
    const e = `${eYr}-${endMD}`;
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
      `&start_date=${s}&end_date=${e}&daily=temperature_2m_max,temperature_2m_min` +
      `&temperature_unit=fahrenheit&timezone=auto`;
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 10000);
        const r    = await fetch(url, { signal: ctrl.signal });
        clearTimeout(tid);
        const d = await r.json();
        if (!d.daily || !d.daily.time) return;
        d.daily.time.forEach((t, i) => {
          const mmdd = t.slice(5);
          if (!byDOY[mmdd]) byDOY[mmdd] = { tmaxSum: 0, tminSum: 0, count: 0 };
          const tx = d.daily.temperature_2m_max[i];
          const tn = d.daily.temperature_2m_min[i];
          if (tx !== null && tn !== null && tx !== undefined && tn !== undefined) {
            byDOY[mmdd].tmaxSum += tx;
            byDOY[mmdd].tminSum += tn;
            byDOY[mmdd].count++;
          }
        });
        return;
      } catch(err) {
        if (attempt === 0) await new Promise(res => setTimeout(res, 600));
      }
    }
  }

  for (let i = 0; i < YEARS.length; i += 3) {
    await Promise.all(YEARS.slice(i, i + 3).map(fetchOneYear));
  }

  if (Object.keys(byDOY).length === 0) throw new Error('Climate normals unavailable — all archive fetches failed.');

  const result = [];
  const cur = new Date(lastKnownDate + 'T12:00:00');
  cur.setDate(cur.getDate() + 1);

  for (let i = 0; i < daysNeeded + 30; i++) {
    const ds = cur.toISOString().slice(0, 10);
    const mmdd = ds.slice(5);
    const entry = byDOY[mmdd];
    if (entry && entry.count > 0) {
      result.push({
        date: ds,
        tmax: entry.tmaxSum / entry.count,
        tmin: entry.tminSum / entry.count,
        usedSoilTemp: false,
        isClimate: true
      });
    }
    cur.setDate(cur.getDate() + 1);
  }

  if (result.length === 0) throw new Error('No climate normal dates matched the needed window.');
  return result;
}

// ─── GDU CALC ─────────────────────────────────────────────────────────────────
function dailyGDU(tmax, tmin, crop) {
  if (tmax === null || tmin === null) return 0;  // precip-only row, no temp data
  const hi = Math.min(tmax, 86);
  const lo = Math.max(tmin, 50);
  if (hi <= lo) return 0;
  return ((hi + lo) / 2) - 50;
}

function calcEmergence(dailyTemps, plantIdx, plantTimeFactor, gduAdj, crop) {
  const base = GDU_TARGETS[crop].base;
  const target = { ...GDU_TARGETS[crop], base: base + gduAdj, low: GDU_TARGETS[crop].low + gduAdj, high: GDU_TARGETS[crop].high + gduAdj };
  let accumulated = 0;
  const rows = [];

  for (let i = plantIdx; i < dailyTemps.length; i++) {
    const { date, tmax, tmin } = dailyTemps[i];
    let raw = dailyGDU(tmax, tmin, crop);
    if (i === plantIdx) raw *= plantTimeFactor;

    accumulated += raw;

    rows.push({
      date,
      tmax: tmax !== null ? Math.round(tmax) : null,
      tmin: tmin !== null ? Math.round(tmin) : null,
      rawGDU: raw.toFixed(1),
      adjGDU: raw.toFixed(1),
      cumGDU: accumulated.toFixed(1),
      pct: Math.min(100, (accumulated / target.base) * 100),
      isClimate: dailyTemps[i].isClimate || false,
      precip: dailyTemps[i].precip !== undefined ? dailyTemps[i].precip : null,
      precipSource: dailyTemps[i].precipSource || null,
      soilTmax: dailyTemps[i].soilTmax !== undefined ? dailyTemps[i].soilTmax : null,
      soilTmin: dailyTemps[i].soilTmin !== undefined ? dailyTemps[i].soilTmin : null
    });

    if (accumulated >= target.base) break;
  }

  return { rows, finalGDU: accumulated, emerged: accumulated >= target.base, target };
}

// ─── MAIN CALC ────────────────────────────────────────────────────────────────
async function calculate() {
  const locationVal  = document.getElementById('locationInput').value.trim();
  const plantDateVal = document.getElementById('plantDate').value;
  const plantTime    = document.querySelector('input[name=plantTime]:checked').value;
  const soilType     = document.getElementById('soilType').value;
  const tillageType  = document.getElementById('tillageType').value;

  const plantTimeFactor = { full: 1.0, half: 0.5, skip: 0.0 }[plantTime];
  const soilGDUadj  = SOIL_GDU_ADJ[soilType] || 0;
  const tillGDUadj  = TILLAGE_GDU_ADJ[tillageType] || 0;
  const totalGDUadj = soilGDUadj + tillGDUadj;

  if (!locationVal)  return showStatus('Please enter a location.', 'error');
  if (!plantDateVal) return showStatus('Please select a planting date.', 'error');

  showStatus('<span class="spinner"></span>Fetching location & weather…', 'info', true);

  try {
    const loc = await geocode(locationVal);
    showStatus('<span class="spinner"></span>Fetching weather data…', 'info', true);

    const weather = await fetchWeather(loc.latitude, loc.longitude, plantDateVal, 60);

    const dailyTemps = weather.daily.time.map((d, i) => ({
      date: d,
      tmax: weather.daily.tmax[i],
      tmin: weather.daily.tmin[i],
      soilTmax: weather.daily.soilTmax[i],
      soilTmin: weather.daily.soilTmin[i],
      usedSoilTemp: weather.daily.usedSoil[i],
      precip: weather.daily.precip[i],
      precipSource: weather.daily.precipSource[i] || null
    }));

    const crops = ['corn', 'soy'];
    const results = {};
    let climateNormals = null;
    let usedClimate = false;

    let plantIdx = dailyTemps.findIndex(d => d.date === plantDateVal);

    if (plantIdx < 0) {
      showStatus('<span class="spinner"></span>Planting date beyond forecast — using 15-yr climate normals…', 'info', true);
      try {
        const dayBefore = new Date(plantDateVal + 'T12:00:00');
        dayBefore.setDate(dayBefore.getDate() - 1);
        const dayBeforeStr = dayBefore.toISOString().slice(0, 10);
        climateNormals = await fetchClimateNormals(loc.latitude, loc.longitude, dayBeforeStr, 90);
        if (!climateNormals || climateNormals.length === 0) {
          throw new Error('No climate data available for this date range.');
        }
        const combinedTemps = [...dailyTemps, ...climateNormals];
        plantIdx = combinedTemps.findIndex(d => d.date === plantDateVal);
        if (plantIdx < 0) throw new Error('Planting date not found even in climate normals.');
        for (const c of crops) {
          results[c] = calcEmergence(combinedTemps, plantIdx, plantTimeFactor, totalGDUadj, c);
          results[c].usedClimate = true;
        }
        usedClimate = true;
      } catch(e) {
        throw new Error('Planting date is beyond the 16-day forecast window and climate normals failed: ' + e.message);
      }
    } else {
      for (const c of crops) {
        results[c] = calcEmergence(dailyTemps, plantIdx, plantTimeFactor, totalGDUadj, c);

        if (!results[c].emerged) {
          try {
            if (!climateNormals) {
              showStatus('<span class="spinner"></span>Fetching 15-yr climate normals…', 'info', true);
              const lastDate = dailyTemps[dailyTemps.length - 1].date;
              climateNormals = await fetchClimateNormals(loc.latitude, loc.longitude, lastDate, 60);
            }
            if (climateNormals && climateNormals.length > 0) {
              const extendedTemps = [...dailyTemps, ...climateNormals];
              results[c] = calcEmergence(extendedTemps, plantIdx, plantTimeFactor, totalGDUadj, c);
              results[c].usedClimate = true;
              usedClimate = true;
            }
          } catch(e) {
            showStatus('⚠ Climate normals fetch failed: ' + e.message, 'error');
          }
        }
      }
    }

    const soilPct = Math.round((weather.soilDays / weather.totalDays) * 100);
    const tempSrc = weather.soilDays > 0 ? `🌱 ${soilPct}% soil temp data` : '🌡 Air temp (soil unavailable)';
    showStatus(`✓ ${loc.name}, ${loc.admin1 || ''} — ${tempSrc}`, 'success');
    renderResults(results, loc, plantDateVal, soilType, tillageType, dailyTemps, plantIdx, totalGDUadj, tempSrc, weather.soilDays, weather.totalDays, weather.forecastMeta);

  } catch(e) {
    showStatus('Error: ' + e.message, 'error');
  }
}

function showStatus(msg, type, raw = false) {
  const el = document.getElementById('statusMsg');
  el.style.display = 'block';
  el.className = 'status-msg ' + type;
  if (raw) el.innerHTML = msg;
  else el.textContent = msg;
}

// ─── RAINFALL HELPERS ─────────────────────────────────────────────────────────
const MM_TO_IN = 0.0393701;

function rollingPrecip(rows, idx) {
  let total = 0;
  let realCount = 0;
  const start = Math.max(0, idx - 6);
  for (let i = start; i <= idx && i < rows.length; i++) {
    if (!rows[i] || rows[i].isClimate) continue;
    if (rows[i].precip !== null && rows[i].precip !== undefined) {
      total += rows[i].precip;
      realCount++;
    }
  }
  return realCount > 0 ? total * MM_TO_IN : null;
}

function precipIcon(rows, idx, cumGDU, targetBase, totalRows) {
  const inches = rollingPrecip(rows, idx);
  if (inches === null) return null;

  if (inches >= 2.0)  return '🌊';
  if (inches >= 1.25) return '💧';

  const daysFromEnd = totalRows - 1 - idx;
  if (inches < 0.1 && daysFromEnd <= 6) return '⚠️';

  return null;
}

function buildRainfallAlerts(rows, plantDate, plantTmin, targetBase) {
  const alerts = [];

  const plantRow = rows[0];
  if (plantRow) {
    const p = (plantRow.precip || 0) * MM_TO_IN;
    if (p > 0.1 && plantTmin < 50) {
      alerts.push({ type: 'cold',
        msg: '🥶 Imbibitional chilling risk — rain near planting with temps below 50°F. Cold water imbibition can reduce germination rates.'
      });
    }
  }

  let maxWet = 0, maxWetDate = null;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].isClimate) continue;
    const in7 = rollingPrecip(rows, i);
    if (in7 !== null && in7 > maxWet) { maxWet = in7; maxWetDate = rows[i].date; }
  }
  if (maxWet >= 2.0) {
    const fmt = new Date(maxWetDate + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
    alerts.push({ type: 'wet',
      msg: `💧 Saturated soil — ${maxWet.toFixed(1)}" accumulated by ${fmt}. Poor aeration may slow germination and increase seedling disease risk.`
    });
  } else if (maxWet >= 1.25) {
    alerts.push({ type: 'wet',
      msg: `💧 Wet conditions — ${maxWet.toFixed(1)}" in 7 days. Monitor for aeration stress, especially on clay soils.`
    });
  }

  let dryStreak = 0, dryStart = null;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].isClimate) continue;
    const daysFromEnd = rows.length - 1 - i;
    const p = rows[i].precip !== null && rows[i].precip !== undefined ? rows[i].precip * MM_TO_IN : null;
    if (p === null) { dryStreak = 0; dryStart = null; continue; }
    if (p < 0.05) {
      if (dryStreak === 0) dryStart = rows[i].date;
      dryStreak++;
    } else {
      dryStreak = 0; dryStart = null;
    }
    if (dryStreak >= 5 && dryStart && daysFromEnd <= 6) {
      const fmt = new Date(dryStart + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
      alerts.push({ type: 'dry',
        msg: `⚠️ Crusting risk — dry streak from ${fmt} during final emergence push. Physical barrier possible on silt loam and clay soils.`
      });
      break;
    }
  }

  return alerts;
}

function gduBand(adjGDU) {
  if (adjGDU <= 0)  return 0;
  if (adjGDU < 5)   return 1;
  if (adjGDU < 10)  return 2;
  if (adjGDU < 16)  return 3;
  return 4;
}

// ─── BUILD CROP PANEL ─────────────────────────────────────────────────────────
function buildCropPanel(crop, result, adjF, plantDate, today, soilDays, totalDays) {
  const isCorn   = crop === 'corn';
  const target   = result.target || GDU_TARGETS[crop];
  const label    = isCorn ? 'Corn' : 'Soybeans';
  const emoji    = isCorn ? '🌽' : '🌱';
  const cls      = isCorn ? 'corn' : 'soy';
  const color    = isCorn ? '#c49a2a' : '#4a8c35';
  const lastRow  = result.rows[result.rows.length - 1];
  const emergeDate = (result.emerged && lastRow) ? lastRow.date : null;

  const climateNote = result.usedClimate
    ? `<div class="climate-note">📊 Projected using 15-yr climate avg<br>(ERA5, 2009–2023) after forecast window</div>`
    : '';

  const adjLabel = adjF === 0 ? 'No soil/tillage adjustment'
    : adjF > 0 ? `+${adjF} GDU added to target (soil/tillage delay)`
    : `${adjF} GDU removed from target (fast soil)`;

  const todayRows = result.rows.filter(r => !r.isClimate && r.date <= today);
  const gduToday  = todayRows.length > 0 ? parseFloat(todayRows[todayRows.length - 1].cumGDU) : 0;
  const pctToday  = Math.min(100, (gduToday / target.base) * 100);

  const plantFmt = new Date(plantDate + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
  const todayFmt = new Date(today + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });

  let emergeCallout = '';
  if (result.emerged && emergeDate) {
    const eFmt = new Date(emergeDate + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const lowD = new Date(emergeDate + 'T12:00:00'); lowD.setDate(lowD.getDate() - 1);
    const hiD  = new Date(emergeDate + 'T12:00:00'); hiD.setDate(hiD.getDate() + 2);
    const fmtLow = lowD.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const fmtHi  = hiD.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const alreadyEmerged = emergeDate <= today;
    if (alreadyEmerged) {
      emergeCallout = `<div class="status-emerge-callout emerged"><span class="callout-main">✅ Emerged &nbsp;${eFmt}</span><span class="callout-sub">Range: ${fmtLow} – ${fmtHi}</span></div>`;
    } else {
      const daysOut = Math.round((new Date(emergeDate + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
      const daysLabel = daysOut === 1 ? '1 day away' : `${daysOut} days away`;
      emergeCallout = `<div class="status-emerge-callout projected"><span class="callout-main">🌱 Projected emergence &nbsp;${eFmt}</span><span class="callout-sub">${daysLabel} &nbsp;·&nbsp; Range: ${fmtLow}–${fmtHi}${result.usedClimate ? ' · 15-yr avg' : ''}</span></div>`;
    }
  } else {
    emergeCallout = `<div class="status-emerge-callout pending">⏳ Still accumulating GDUs — check back as temperatures warm</div>`;
  }

  let soilTempNote = '';
  if (soilDays && totalDays) {
    const soilPct = Math.round((soilDays / totalDays) * 100);
    if (soilPct >= 80)     soilTempNote = `<div class="soil-temp-note full">🌡 Using 6cm soil temperature data</div>`;
    else if (soilPct > 0)  soilTempNote = `<div class="soil-temp-note partial">🌡 ${soilPct}% soil temp · ${100 - soilPct}% air temp</div>`;
    else                   soilTempNote = `<div class="soil-temp-note air">🌬 Using air temperature (soil data unavailable)</div>`;
  }

  let totalDaysInSoil = null;
  if (result.emerged && emergeDate) {
    const p = new Date(plantDate + 'T12:00:00');
    const e = new Date(emergeDate + 'T12:00:00');
    totalDaysInSoil = Math.round((e - p) / 86400000);
  }

  const plantDt = new Date(plantDate + 'T12:00:00');
  const todayDt = new Date(today  + 'T12:00:00');
  const daysSincePlanted = Math.max(0, Math.round((todayDt - plantDt) / 86400000));

  const { totalRainIn, rainMissingDays, rainSeamlessDays, rainArchiveDays, rainForecastFillDays, todayFcstIn } = (() => {
    let sum = 0, hasData = false, missing = 0, archiveDays = 0, seamlessDays = 0, forecastFillDays = 0;
    let todayFcst = null;
    for (const r of result.rows) {
      if (r.isClimate) continue;
      if (r.date > today) continue; // exclude future beyond today
      if (r.date === today) {
        // today's row — forecast source only, captured separately for ~ display
        if (r.precip !== null && r.precip !== undefined && r.precipSource === 'forecast') {
          todayFcst = r.precip * MM_TO_IN;
        }
        continue; // don't add to observed total
      }
      // past days only below
      if (r.precip !== null && r.precip !== undefined) {
        sum += r.precip * MM_TO_IN;
        hasData = true;
        if (r.precipSource === 'seamless') seamlessDays++;
        else if (r.precipSource === 'archive') archiveDays++;
        else forecastFillDays++;
      } else {
        missing++;
      }
    }
    return { totalRainIn: hasData ? sum : null, rainMissingDays: missing,
             rainArchiveDays: archiveDays, rainSeamlessDays: seamlessDays,
             rainForecastFillDays: forecastFillDays, todayFcstIn: todayFcst };
  })();

  // Combined total including today's forecast for the ~ display
  const combinedRainIn = (totalRainIn !== null || todayFcstIn !== null)
    ? ((totalRainIn || 0) + (todayFcstIn || 0))
    : null;
  const includestoday = todayFcstIn !== null && todayFcstIn > 0;

  const heavyRainDays = result.rows.filter(r => !r.isClimate && r.date < today && r.precip !== null && (r.precip * MM_TO_IN) >= 1.0).length;

  const FORECAST_WINDOW = 5;
  const forecastCutoff = (() => {
    const d = new Date(today + 'T12:00:00');
    d.setDate(d.getDate() + FORECAST_WINDOW);
    return d.toISOString().slice(0, 10);
  })();

  const plantedRecently = daysSincePlanted <= 3;
  const plantedFuture   = plantDate > today;

  const { nearRainIn, nearRainDays, nearHeavyDays } = (() => {
    let sum = 0, days = 0, heavy = 0;
    for (const r of result.rows) {
      if (r.isClimate) continue;
      if (r.date <= today) continue;
      if (r.date > forecastCutoff) continue;
      if (r.precip !== null && r.precip !== undefined) {
        const inches = r.precip * MM_TO_IN;
        sum += inches;
        days++;
        if (inches >= 1.0) heavy++;
      }
    }
    return { nearRainIn: days > 0 ? sum : null, nearRainDays: days, nearHeavyDays: heavy };
  })();

  const showNearForecast = (plantedFuture || plantedRecently) && nearRainIn !== null;

  const rainColHTML = (combinedRainIn !== null || showNearForecast) ? `
    <div class="days-in-soil" style="border-left:none;border-right:1.5px solid #c9a060;padding-left:0;padding-right:12px;text-align:left;min-width:0">
      ${combinedRainIn !== null ? `
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <div class="days-in-soil-val" style="color:#2878c8">${includestoday ? '~' : ''}${combinedRainIn.toFixed(2)}"${rainMissingDays > 0 ? '<span style="font-size:0.65rem;color:#c08030;vertical-align:super">*</span>' : ''}</div>
          ${heavyRainDays > 0 ? `<div style="font-family:var(--font-din);font-size:0.75rem;font-weight:600;color:#1050a8;white-space:nowrap">${heavyRainDays}d&nbsp;heavy</div>` : ''}
        </div>
        <div class="days-in-soil-label" style="${showNearForecast ? 'margin-bottom:4px' : ''}">

    <div class="status-bar-wrap">
      <div class="status-bar-header">
        <div>
          <div class="status-bar-gdu" style="color:${color}" id="gdu-stat-${crop}">0</div>
          <div class="status-bar-sub">GDU as of today &nbsp;/&nbsp; ${target.base} needed</div>
        </div>
        <div style="display:flex;align-items:stretch;gap:0;margin-left:auto">
          ${rainColHTML}
          ${rightColHTML}

      <div class="status-bar-dates">
        <span>🌱 ${plantFmt} &nbsp;<span style="font-family:var(--font-din);font-size:0.82rem;font-weight:600;color:${color}">(day ${daysSincePlanted})</span></span>
        <span id="pct-stat-${crop}" style="color:${color};font-family:var(--font-din);font-size:0.88rem;font-weight:600">0%</span>
        <span>Today ${todayFmt}</span>
      </div>
      ${emergeCallout}

    ${climateNote}`;

  const rainfallAlerts = buildRainfallAlerts(result.rows, plantDate, result.rows[0] ? result.rows[0].tmin : 60, target.base);
  const rainfallAlertsHTML = rainfallAlerts.map(a =>
    `<div class="rainfall-alert alert-${a.type}">${a.msg}</div>`
  ).join('');

  const calHTML = buildCalendarHeatmap(result.rows, crop, color);

  return `

        ${statusBarHTML}

        ${rainfallAlertsHTML}
        <div class="cal-legend">
          <div class="cal-legend-cell" style="background:#f0b8b0;border-color:#d89080"></div><span>0 GDU</span>
          &nbsp;
          <div class="cal-legend-cell" style="background:#f5cfa0;border-color:#e0a860"></div><span>&lt;5</span>
          &nbsp;
          <div class="cal-legend-cell" style="background:#f5e8a0;border-color:#d8cc70"></div><span>5–10</span>
          &nbsp;
          <div class="cal-legend-cell" style="background:#c8e8a8;border-color:#88c878"></div><span>10–16</span>

        <div class="adj-note" style="margin-top:10px">${adjLabel}<br>Adjusted target: ${target.low}–${target.high} GDU<br><span style='opacity:0.7;font-size:0.65rem'>Sources: UNL CropWatch, ISU ICM</span></div>
      </div>
    </div>`;
}

// ─── CALENDAR HEATMAP ─────────────────────────────────────────────────────────
function buildCalendarHeatmap(rows, crop, color) {
  if (!rows || rows.length === 0) return '';

  const isEmerged  = rows[rows.length - 1] && parseFloat(rows[rows.length - 1].cumGDU) >= GDU_TARGETS[crop].base;
  const emergeDate = isEmerged ? rows[rows.length - 1].date : null;

  const plantDate = rows[0].date;
  const lastDate  = (() => {
    if (!emergeDate) return rows[rows.length - 1].date;
    const d = new Date(emergeDate + 'T12:00:00');
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0, 10);
  })();

  const byDate = {};
  rows.forEach(r => { byDate[r.date] = r; });

  const windowDates = [];
  const cur = new Date(plantDate + 'T12:00:00');
  const end = new Date(lastDate  + 'T12:00:00');
  while (cur <= end) {
    windowDates.push(cur.toISOString().slice(0, 10));
    cur.setDate(cur.getDate() + 1);
  }

  const startDow = new Date(plantDate + 'T12:00:00').getDay();
  const DOW_LABELS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  const sundayPad = startDow;
  const paddedCells = [...Array(sundayPad).fill(null), ...windowDates];

  const weeks = [];
  for (let i = 0; i < paddedCells.length; i += 7) {
    weeks.push(paddedCells.slice(i, i + 7));
  }

  const months = [...new Set(windowDates.map(d => d.slice(0,7)))];
  const monthLabel = months.map(ym => {
    const [yr, mo] = ym.split('-').map(Number);
    return new Date(yr, mo-1, 1).toLocaleDateString('en-US', { month:'short', year:'numeric' });
  }).join(' – ');

  const totalRows = rows.length;

  let html = `<div class="cal-month-label">${monthLabel}</div>`;
  html += `<div class="cal-dow-row">${DOW_LABELS.map(d => `<div class="cal-dow">${d}</div>`).join('')}</div>`;

  weeks.forEach(wk => {
    html += `<div class="cal-grid">`;
    wk.forEach(ds => {
      if (ds === null) { html += `<div class="cal-cell empty"></div>`; return; }
      const row = byDate[ds];
      const d   = new Date(ds + 'T12:00:00');
      const dayNum = d.getDate();

      if (!row) {
        html += `<div class="cal-cell pre-plant">${dayNum}</div>`;
      } else {
        const band      = gduBand(parseFloat(row.adjGDU));
        const isEmerg   = isEmerged && ds === emergeDate;
        const climClass = row.isClimate ? ' climate' : '';
        const isPlant   = ds === plantDate;
        const plantStyle = isPlant ? 'box-shadow:0 0 0 2px #8b6347;' : '';

        const avgTag  = row.isClimate ? `<span style="display:block;font-size:0.6rem;line-height:1;opacity:0.75;letter-spacing:0.02em">avg</span>` : '';
        const rowIdx  = rows.indexOf(row);
        const cumGDUval = parseFloat(row.cumGDU);

        const rainIcon = row.isClimate ? null : precipIcon(rows, rowIdx, cumGDUval, GDU_TARGETS[crop].base, totalRows);
        const iconTag  = rainIcon ? `<span style="position:absolute;bottom:2px;right:2px;font-size:0.55rem;line-height:1">${rainIcon}</span>` : '';

        const pStatus = (() => {
          const i = rollingPrecip(rows, rowIdx);
          if (i === null) return 'unknown';
          if (i >= 2)    return 'saturated';
          if (i >= 1.25) return 'wet';
          const daysFromEnd = totalRows - 1 - rowIdx;
          if (i < 0.1 && daysFromEnd <= 6) return 'dry';
          if (i < 0.5) return 'light';
          return 'adequate';
        })();

        // Single-day precip in inches for display; 7-day rolling total separately
        const dayPrecipIn = row.precip !== null && row.precip !== undefined
          ? (row.precip * MM_TO_IN).toFixed(2) : '?';
        const rain7 = row.isClimate ? null : rollingPrecip(rows, rowIdx);
        const rain7str = rain7 !== null ? rain7.toFixed(2) : '?';

        const dataAttrs = `data-date="${ds}" data-tmax="${row.tmax !== null ? row.tmax : ''}" data-tmin="${row.tmin !== null ? row.tmin : ''}" data-soiltmax="${row.soilTmax !== null && row.soilTmax !== undefined ? Math.round(row.soilTmax) : ''}" data-soiltmin="${row.soilTmin !== null && row.soilTmin !== undefined ? Math.round(row.soilTmin) : ''}" data-gdu="${row.adjGDU}" data-cum="${row.cumGDU}" data-climate="${row.isClimate ? '1' : '0'}" data-precip="${dayPrecipIn}" data-rain7="${rain7str}" data-pstatus="${pStatus}" data-psrc="${row.precipSource || ''}" data-notemp="${row.tmax === null ? '1' : '0'}"`;

        if (isEmerg) {
          html += `<div class="cal-cell gdu-${band}${climClass} emergence" ${dataAttrs} style="${plantStyle};overflow:hidden">🌱${iconTag}</div>`;
        } else {
          html += `<div class="cal-cell gdu-${band}${climClass}" ${dataAttrs} style="${plantStyle};flex-direction:column;gap:0;overflow:hidden">${dayNum}${avgTag}${iconTag}</div>`;
        }
      }
    });
    const rem = 7 - wk.length;
    for (let p = 0; p < rem; p++) html += `<div class="cal-cell empty"></div>`;
    html += `</div>`;
  });

  return html;
}

// ─── ANIMATE STATS ────────────────────────────────────────────────────────────
function animateStats(results, today) {
  for (const [crop, result] of Object.entries(results)) {
    const target = result.target || GDU_TARGETS[crop];
    const todayRows = result.rows.filter(r => !r.isClimate && r.date <= today);
    const gduToday  = todayRows.length > 0 ? parseFloat(todayRows[todayRows.length - 1].cumGDU) : 0;
    const pctToday  = Math.min(100, (gduToday / target.base) * 100);

    const progEl = document.getElementById('prog-' + crop);
    if (progEl) setTimeout(() => { progEl.style.width = pctToday + '%'; }, 60);

    const statEl = document.getElementById('gdu-stat-' + crop);
    const pctEl  = document.getElementById('pct-stat-' + crop);
    if (statEl) {
      let frame = 0;
      const frames = 50;
      const timer = setInterval(() => {
        frame++;
        const t = Math.min(1, frame / frames);
        const ease = 1 - Math.pow(1 - t, 3);
        statEl.textContent = Math.round(ease * gduToday);
        if (pctEl) pctEl.textContent = Math.round(ease * pctToday) + '%';
        if (frame >= frames) clearInterval(timer);
      }, 18);
    }
  }
}

function buildChartData(results, dailyTemps, plantIdx) {
  const crops = Object.keys(results);
  const refCrop = crops.reduce((a, b) => results[a].rows.length >= results[b].rows.length ? a : b);
  const refRows = results[refCrop].rows;

  const labels = [];
  const gduLine = [];
  for (let i = 0; i < refRows.length; i++) {
    labels.push(`Day ${i}`);
    gduLine.push(parseFloat(refRows[i].cumGDU));
  }

  const emergeIdx = {};
  for (const c of crops) {
    const rows = results[c].rows;
    const tgt  = results[c].target ? results[c].target.base : GDU_TARGETS[c].base;
    const idx  = rows.findIndex(r => parseFloat(r.cumGDU) >= tgt);
    emergeIdx[c] = idx >= 0 ? idx : null;
  }

  const precip = refRows.map(r => ({
    inches: (r.precip !== null && r.precip !== undefined && !r.isClimate)
      ? r.precip * 0.0393701 : null,
    isClimate: r.isClimate || false,
    date: r.date
  }));

  const emergeTargets = {};
  for (const c of crops) {
    emergeTargets[c] = results[c].target ? results[c].target.base : GDU_TARGETS[c].base;
  }

  return { labels, gduLine, emergeIdx, emergeTargets, precip };
}

function drawChart(chartData, crops) {
  const canvas = document.getElementById('gduChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight;
  canvas.width = W;
  canvas.height = H;

  const RAIN_ZONE = 36;
  const RAIN_MAX  = 2.5;
  const pad = { top: 24, right: 24, bottom: 36 + RAIN_ZONE, left: 52 };
  const cW  = W - pad.left - pad.right;
  const cH  = H - pad.top - pad.bottom;

  const vals   = chartData.gduLine || [];
  const maxLen = vals.length;
  if (maxLen < 2) return;

  const maxVal = Math.max(...vals, GDU_TARGETS.corn.high + 60);
  const step   = cW / (maxLen - 1);

  const cropColors = { corn: '#c49a2a', soy: '#4a8c35' };

  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = '#d4c090';
  ctx.lineWidth = 1;
  for (let g = 0; g <= 5; g++) {
    const y = pad.top + cH - (g / 5) * cH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    ctx.fillStyle = '#8b6347';
    ctx.font = '600 12px Titillium Web, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round((g / 5) * maxVal), pad.left - 6, y + 4);
  }

  for (const c of crops) {
    const tgt = (chartData.emergeTargets && chartData.emergeTargets[c]) || GDU_TARGETS[c].base;
    const y   = pad.top + cH - (tgt / maxVal) * cH;
    ctx.strokeStyle = cropColors[c];
    ctx.setLineDash([5, 4]);
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.45;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.setLineDash([]);
    ctx.fillStyle = cropColors[c];
    ctx.font = '600 10px Titillium Web, sans-serif';
    ctx.textAlign = 'left';
    ctx.globalAlpha = 0.7;
    ctx.fillText((c === 'corn' ? '🌽' : '🌱') + ' ' + tgt, pad.left + cW + 3, y + 4);
    ctx.globalAlpha = 1;
  }

  const precip  = chartData.precip || [];
  const barW    = Math.max(2, step * 0.55);
  const rainTop = pad.top + cH + 4;
  const rainBot = rainTop + RAIN_ZONE - 2;

  ctx.strokeStyle = 'rgba(180,160,100,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(pad.left, rainTop - 2);
  ctx.lineTo(pad.left + cW, rainTop - 2);
  ctx.stroke();

  for (let i = 0; i < precip.length && i < maxLen; i++) {
    const p = precip[i];
    if (!p || p.inches === null || p.isClimate || p.inches <= 0) continue;
    const x     = pad.left + i * step;
    const frac  = Math.min(1, p.inches / RAIN_MAX);
    const barH  = Math.max(2, frac * (rainBot - rainTop));
    const heavy = p.inches >= 1.0;
    ctx.fillStyle = heavy ? 'rgba(20,80,168,0.85)' : 'rgba(90,159,199,0.65)';
    ctx.fillRect(x - barW / 2, rainBot - barH, barW, barH);
    if (heavy) {
      ctx.beginPath();
      ctx.arc(x, rainBot - barH - 4, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(20,80,168,0.9)';
      ctx.fill();
    }
  }

  ctx.fillStyle = 'rgba(100,140,180,0.65)';
  ctx.font = '600 10px Titillium Web, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('rain"', pad.left - 4, rainTop + (rainBot - rainTop) / 2 + 4);

  ctx.beginPath();
  for (let i = 0; i < vals.length; i++) {
    const x = pad.left + i * step;
    const y = pad.top + cH - (vals[i] / maxVal) * cH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(pad.left + (vals.length - 1) * step, pad.top + cH);
  ctx.lineTo(pad.left, pad.top + cH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(180,140,60,0.10)';
  ctx.fill();

  ctx.beginPath();
  for (let i = 0; i < vals.length; i++) {
    const x = pad.left + i * step;
    const y = pad.top + cH - (vals[i] / maxVal) * cH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#d4a853';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  for (const c of crops) {
    const eIdx = chartData.emergeIdx ? chartData.emergeIdx[c] : null;
    if (eIdx === null || eIdx < 0 || eIdx >= vals.length) continue;
    const x = pad.left + eIdx * step;
    const y = pad.top + cH - (vals[eIdx] / maxVal) * cH;
    const col = cropColors[c];
    const label = c === 'corn' ? '🌽' : '🌱';

    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(x, y + 8);
    ctx.lineTo(x, pad.top + cH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = '13px Titillium Web, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y - 13);

    ctx.fillStyle = col;
    ctx.font = '700 11px Titillium Web, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`Day ${eIdx}`, x, pad.top + cH + 14);
  }

  ctx.fillStyle = '#8b6347';
  ctx.font = '600 11px Titillium Web, sans-serif';
  ctx.textAlign = 'center';
  const emergePositions = new Set(
    crops.map(c => chartData.emergeIdx?.[c]).filter(i => i !== null)
  );
  for (let i = 0; i < maxLen; i += Math.ceil(maxLen / 8)) {
    if (emergePositions.has(i)) continue;
    const x = pad.left + i * step;
    ctx.fillText(chartData.labels[i] || `Day ${i}`, x, H - 6);
  }

  let lx = pad.left;
  ctx.strokeStyle = '#d4a853';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(lx, 12); ctx.lineTo(lx + 20, 12); ctx.stroke();
  ctx.fillStyle = '#3d2b1f';
  ctx.font = '600 12px Titillium Web, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('GDU', lx + 24, 16);
  lx += 64;

  for (const c of crops) {
    ctx.beginPath();
    ctx.arc(lx + 6, 12, 6, 0, Math.PI * 2);
    ctx.fillStyle = cropColors[c];
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#3d2b1f';
    ctx.font = '600 12px Titillium Web, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(c === 'corn' ? '🌽 Corn emerge' : '🌱 Soy emerge', lx + 16, 16);
    lx += 130;
  }

  ctx.fillStyle = 'rgba(90,159,199,0.65)';
  ctx.fillRect(lx, 6, 10, 10);
  ctx.fillStyle = 'rgba(20,80,168,0.85)';
  ctx.fillRect(lx + 12, 6, 10, 10);
  ctx.fillStyle = '#3d2b1f';
  ctx.font = '600 12px Titillium Web, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Rain / Heavy', lx + 26, 16);
}

function buildTable(results, crops) {
  const rows = [];
  const maxRows = Math.max(...crops.map(c => results[c].rows.length));
  for (let i = 0; i < maxRows; i++) {
    rows.push(crops.map(c => results[c].rows[i] || null));
  }

  let html = `<table><thead><tr>
    <th>Date</th><th>Hi°F</th><th>Lo°F</th><th>Rain Src</th>`;
  for (const c of crops) {
    const lbl = c === 'corn' ? 'Corn' : 'Soy';
    html += `<th>${lbl} GDU</th><th>${lbl} Adj</th><th>${lbl} Total</th>`;
  }
  html += '</tr></thead><tbody>';

  // Source label map
  const srcLabel = { seamless: 'S', archive: 'A', forecast: 'F' };
  const srcTitle = { seamless: 'ERA5-Seamless', archive: 'ERA5 Classic', forecast: 'Forecast' };
  const srcColor = { seamless: '#0a8a50', archive: '#8b6347', forecast: '#c49a2a' };

  for (const rowSet of rows) {
    const ref = rowSet.find(r => r !== null);
    if (!ref) continue;
    const d = new Date(ref.date + 'T12:00:00');
    const fmt = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const isClimRow = ref.isClimate || false;
    const climClass = isClimRow ? ' class="td-climate"' : '';
    const climTag   = isClimRow ? '<span class="climate-row-label">avg</span>' : '';

    // Rain source cell
    const ps = ref.precipSource;
    const srcCell = isClimRow
      ? '<td style="opacity:0.4">—</td>'
      : ps
        ? `<td style="font-weight:700;color:${srcColor[ps] || '#888'}" title="${srcTitle[ps] || ps}">${srcLabel[ps] || ps}</td>`
        : '<td style="opacity:0.4">—</td>';

    html += `<tr${isClimRow ? ' style="background:#f0f7fc"' : ''}><td${climClass}>${fmt}${climTag}</td><td${climClass}>${ref.tmax !== null ? ref.tmax : '—'}</td><td${climClass}>${ref.tmin !== null ? ref.tmin : '—'}</td>${srcCell}`;
    for (let ci = 0; ci < crops.length; ci++) {
      const row = rowSet[ci];
      const c = crops[ci];
      const cls = c === 'corn' ? 'td-corn' : 'td-soy';
      if (!row) { html += `<td>—</td><td>—</td><td>—</td>`; continue; }
      const target = results[c].target || GDU_TARGETS[c];
      const emerged = parseFloat(row.cumGDU) >= target.base;
      html += `<td class="${cls}">${row.rawGDU}</td><td class="${cls}">${row.adjGDU}</td><td class="${cls} ${emerged ? 'td-emerged' : ''}">${row.cumGDU}${emerged ? ' ✓' : ''}</td>`;
    }
    html += '</tr>';
  }

  // Table legend
  html += `</tbody></table>
    <div style="padding:8px 12px;font-family:var(--font-data);font-size:0.68rem;color:#6b5a42;border-top:1px solid #ddd0b0;display:flex;gap:16px;flex-wrap:wrap">
      <span><strong style="color:#0a8a50">S</strong> = ERA5-Seamless (~1-2d lag)</span>
      <span><strong style="color:#8b6347">A</strong> = ERA5 Classic (~5d lag)</span>
      <span><strong style="color:#c49a2a">F</strong> = Forecast model</span>
    </div>`;

  return html;
}

const STORAGE_KEY = 'emergence_gdu_last_entry';

function saveEntry() {
  const entry = {
    location:  document.getElementById('locationInput').value,
    plantDate: document.getElementById('plantDate').value,
    plantTime: document.querySelector('input[name=plantTime]:checked')?.value || 'full',
    soilType:  document.getElementById('soilType').value,
    tillage:   document.getElementById('tillageType').value,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entry)); } catch(e) {}
}

function restoreEntry() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const e = JSON.parse(raw);
    if (e.location)  document.getElementById('locationInput').value = e.location;
    if (e.plantDate) document.getElementById('plantDate').value = e.plantDate;
    if (e.plantTime) {
      const r = document.querySelector(`input[name=plantTime][value="${e.plantTime}"]`);
      if (r) r.checked = true;
    }
    if (e.soilType) document.getElementById('soilType').value = e.soilType;
    if (e.tillage)  document.getElementById('tillageType').value = e.tillage;
    return true;
  } catch(e) { return false; }
}

// ── Debounce: ignore clicks while calculation is running ──────────────────────
let _calcRunning = false;
const _origCalc = calculate;
window.calculate = async function() {
  if (_calcRunning) return;
  _calcRunning = true;
  const btn = document.querySelector('.calc-btn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
  try {
    saveEntry();
    await _origCalc();
  } finally {
    _calcRunning = false;
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
  }
};

// ─── CALENDAR TOOLTIP ─────────────────────────────────────────────────────────
function attachCalTooltips() {
  const tip = document.getElementById('calTooltip');
  if (!tip) return;

  // Source label for tooltip
  const srcFull = { seamless: 'ERA5-Seamless', archive: 'ERA5 Classic', forecast: 'Forecast' };
  const srcCol  = { seamless: '#0a8a50', archive: '#8b6347', forecast: '#c49a2a' };

  document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.addEventListener('mouseenter', function() {
      const ds       = this.dataset.date;
      const tmax     = this.dataset.tmax;
      const tmin     = this.dataset.tmin;
      const soilTmax = this.dataset.soiltmax;
      const soilTmin = this.dataset.soiltmin;
      const gdu      = parseFloat(this.dataset.gdu).toFixed(1);
      const cum      = parseFloat(this.dataset.cum).toFixed(1);
      const isClim   = this.dataset.climate === '1';
      const noTemp   = this.dataset.notemp === '1';
      const dayPrecip = this.dataset.precip;   // single-day inches
      const rain7     = this.dataset.rain7;    // 7-day rolling inches
      const pstatus  = this.dataset.pstatus;
      const psrc     = this.dataset.psrc || '';
      const d        = new Date(ds + 'T12:00:00');
      const fmt      = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
      const pLabel   = { dry:'Dry / crust risk', light:'Light rain', adequate:'Adequate', wet:'Wet', saturated:'Saturated' }[pstatus] || '';
      const pColor   = { dry:'#e8a020', light:'#60b8e0', adequate:'#4a7c3f', wet:'#2878c8', saturated:'#1050a8' }[pstatus] || 'transparent';

      const srcLine = (!isClim && psrc && srcFull[psrc])
        ? `<div class="cal-tooltip-row" style="margin-top:3px"><span class="cal-tooltip-label">Precip source</span><span class="cal-tooltip-val" style="color:${srcCol[psrc] || '#f8f0dc'}">${srcFull[psrc]}</span></div>`
        : '';

      const noTempNote = noTemp
        ? `<div style="margin-top:5px;padding:3px 7px;border-radius:4px;font-size:0.78rem;background:rgba(180,140,60,0.2);color:#c8a040">⚠ Temp data missing — rain preserved, GDU = 0</div>`
        : '';

      tip.innerHTML =
        '<div class="cal-tooltip-date">' + fmt + (isClim ? ' <span style="font-weight:400;opacity:0.65;font-size:0.8rem">(15-yr avg)</span>' : '') + '</div>' +
        (tmax ? '<div class="cal-tooltip-row"><span class="cal-tooltip-label">Air High</span><span class="cal-tooltip-val">' + tmax + '°F</span></div>' : '') +
        (tmin ? '<div class="cal-tooltip-row"><span class="cal-tooltip-label">Air Low</span><span class="cal-tooltip-val">' + tmin + '°F</span></div>' : '') +
        (soilTmax ? '<div class="cal-tooltip-row"><span class="cal-tooltip-label">Soil High (6cm)</span><span class="cal-tooltip-val">' + soilTmax + '°F</span></div>' : '') +
        (soilTmin ? '<div class="cal-tooltip-row"><span class="cal-tooltip-label">Soil Low (6cm)</span><span class="cal-tooltip-val">' + soilTmin + '°F</span></div>' : '') +
        '<div class="cal-tooltip-row"><span class="cal-tooltip-label">Daily GDU</span><span class="cal-tooltip-val">' + gdu + '</span></div>' +
        '<div class="cal-tooltip-row" style="border-top:1px solid rgba(212,168,83,0.3);margin-top:5px;padding-top:5px"><span class="cal-tooltip-label">Cumulative GDU</span><span class="cal-tooltip-val">' + cum + '</span></div>' +
        (!isClim && dayPrecip && dayPrecip !== '?' ? '<div class="cal-tooltip-row" style="border-top:1px solid rgba(212,168,83,0.3);margin-top:5px;padding-top:5px"><span class="cal-tooltip-label">Today\'s rain</span><span class="cal-tooltip-val">' + dayPrecip + '"</span></div>' : '') +
        (!isClim && rain7 && rain7 !== '?' ? '<div class="cal-tooltip-row"><span class="cal-tooltip-label">7-day total</span><span class="cal-tooltip-val">' + rain7 + '"</span></div>' : '') +
        srcLine +
        noTempNote +
        (pLabel && pstatus !== 'adequate' ? '<div style="margin-top:5px;padding:3px 7px;border-radius:4px;font-size:0.8rem;font-weight:600;background:' + pColor + ';color:white">' + pLabel + '</div>' : '');

      tip.style.display = 'block';

      const r  = this.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const scrollX = window.scrollX || window.pageXOffset;
      const scrollY = window.scrollY || window.pageYOffset;

      let x = r.right  + scrollX + 8;
      let y = r.top    + scrollY;

      if (x + tr.width  > window.innerWidth  + scrollX - 8) x = r.left + scrollX - tr.width - 8;
      if (y + tr.height > window.innerHeight + scrollY - 8) y = r.bottom + scrollY - tr.height;

      tip.style.left = x + 'px';
      tip.style.top  = y + 'px';
    });

    cell.addEventListener('mouseleave', function() {
      const tip = document.getElementById('calTooltip');
      if (tip) tip.style.display = 'none';
    });
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
const today = localToday();
document.getElementById('plantDate').value = today;
const restored = restoreEntry();
if (restored) {
  showStatus('✓ Last entry restored', 'success');
  setTimeout(() => { const el = document.getElementById('statusMsg'); if(el) el.style.display = 'none'; }, 2500);
}
</script>

<div id="calTooltip" class="cal-tooltip"></div>
</body>
