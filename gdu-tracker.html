<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDU Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>GDU Tracker</h1>
    </header>
    <main>
        <section id="tracker">
            <h2>Track Your GDUs</h2>
            <form id="gdu-form">
                <label for="gdu-input">GDUs:</label>
                <input type="number" id="gdu-input" required>
                <button type="submit">Track</button>
            </form>
            <div id="results"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
